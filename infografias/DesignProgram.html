  function drillUp(el, targetFolder) {
    const win = el.closest('.file-win');
    selectFolder_silent(targetFolder);
    const inner = win.querySelector('.sch-inner');
    const header = win.querySelector('.preview-header');
    const toolbar = win.querySelector('.sch-toolbar');
    if (inner) {
      inner.innerHTML = '<div style="padding:16px;position:relative">' + buildSchematic(targetFolder) + '</div>'
        + '<div class="sch-placed-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>'
        + '<svg class="sch-wire-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;"></svg>';
      inner.dataset.scale='1'; inner.dataset.ox='0'; inner.dataset.oy='0';
      inner.style.transform='';
    }
    if (header) header.textContent = 'Esquemático — ' + targetFolder + '.sch';
    if (toolbar) {
      const bc = toolbar.querySelector('[id^="schBreadcrumb_"]');
      if (bc) bc.innerHTML = getBreadcrumb(targetFolder);
    }
    // Reset zoom
    if (inner) { inner.dataset.scale='1'; inner.dataset.ox='0'; inner.dataset.oy='0'; inner.style.transform=''; }

  function selectFolder_silent(name) {
    // Update currentFolder and left panel without triggering event
    currentFolder = name;
    document.querySelectorAll('.folder').forEach(f => {
      const fn = f.querySelector('.folder-name');
      f.classList.toggle('selected', fn && fn.textContent === name);
    });
  }

  // Make IC blocks in chip_top_v3 clickable for drill-down (injected after buildSchematic)
  function addDrillLinks(svgEl, folder) {
    if (!svgEl) return;
    const children = HIERARCHY[folder] || [];
    svgEl.querySelectorAll('rect').forEach(rect => {
      // Find rects that are IC blocks (have purple stroke)
      const stroke = rect.getAttribute('stroke');
      if (stroke !== '#a07cff') return;
      const rx = parseFloat(rect.getAttribute('rx') || '0');
      if (rx < 3) return; // only rounded IC blocks
      // Try to find matching label nearby
      const x = parseFloat(rect.getAttribute('x'));
      const y = parseFloat(rect.getAttribute('y'));
      const w = parseFloat(rect.getAttribute('width'));
      const h = parseFloat(rect.getAttribute('height'));
      const texts = svgEl.querySelectorAll('text');
      texts.forEach(t => {
        const tx = parseFloat(t.getAttribute('x'));
        const ty = parseFloat(t.getAttribute('y'));
        if (tx >= x && tx <= x+w && ty >= y && ty <= y+h) {
          const label = t.textContent.trim().toLowerCase().replace(/\s+/g,'_');
          const match = children.find(c => label.includes(c.split('_')[0]));
          if (match) {
            rect.style.cursor = 'pointer';
            rect.title = 'Open ' + match;
            rect.addEventListener('click', (e) => {
              e.stopPropagation();
              const win = rect.closest('.file-win');
              drillInto(win, match);
            });
          }
        }
      });
    });
  }

  function drillInto(win, targetFolder) {
    selectFolder_silent(targetFolder);
    const inner = win.querySelector('.sch-inner');
    const header = win.querySelector('.preview-header');
    const toolbar = win.querySelector('.sch-toolbar');
    if (inner) {
      inner.innerHTML = '<div style="padding:16px;position:relative">' + buildSchematic(targetFolder) + '</div>'
        + '<div class="sch-placed-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>'
        + '<svg class="sch-wire-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;"></svg>';
      inner.dataset.scale='1'; inner.dataset.ox='0'; inner.dataset.oy='0';
      inner.style.transform='';
      setTimeout(() => addDrillLinks(inner.querySelector('svg'), targetFolder), 50);
    }
    if (header) header.textContent = 'Esquemático — ' + targetFolder + '.sch';
    if (toolbar) {
      const bc = toolbar.querySelector('[id^="schBreadcrumb_"]');
      if (bc) bc.innerHTML = getBreadcrumb(targetFolder);
    }
  }

      `<div class="import-elem-item ${selectedElem===e.name?'active':''}" onclick="selectImportElem('${e.name}','${lib}')">

  // ELEMENT PLACEMENT + WIRE DRAWING

  let placingElem  = null;   // { name, type, svgStr } while ghost is active
  let wireMode     = false;
  let wireStart    = null;   // {x,y} in canvas coords
  let wires        = [];     // [{x1,y1,x2,y2}] persisted wires per canvas
  let currentGhost = null;   // the ghost div following mouse

  // SVG snippets for placed elements (compact symbols)
  // Returns SVG inner content (no <svg> wrapper) in schematic coords (centred at 0,0)
  // Scale: matches the 320x220 schematic viewBox — symbols are ~30px wide
  function elemGContent(name) {
    const CO='#a07cff', W='#5a9cf5', BG='#191926', TX='#a0a0c0', DM='#555577';

    // NMOS: centred at (0,0)
    // Gate plate at x=-8 (vertical), body at x=-4 (vertical), terminal stubs go RIGHT to x=+8
    // Gate wire exits left to x=-22
    // Drain terminal: (8,-10)→up  Source terminal: (8,+10)→down
    if (name.startsWith('NMOS')) return `
<line x1="-8" y1="-14" x2="-8" y2="14"  stroke="${CO}" stroke-width="2.2"/>
<line x1="-4" y1="-14" x2="-4" y2="14"  stroke="${CO}" stroke-width="2"/>
<line x1="-4" y1="-10" x2="8"  y2="-10" stroke="${CO}" stroke-width="1.5"/>
<line x1="-4" y1="0"   x2="8"  y2="0"   stroke="${CO}" stroke-width="1.5"/>
<line x1="-4" y1="10"  x2="8"  y2="10"  stroke="${CO}" stroke-width="1.5"/>
<line x1="-8" y1="0"   x2="-22" y2="0"  stroke="${W}" stroke-width="1.5"/>
<line x1="8"  y1="-10" x2="8"  y2="-20" stroke="${W}" stroke-width="1.5"/>
<line x1="8"  y1="10"  x2="8"  y2="20"  stroke="${W}" stroke-width="1.5"/>
<text x="12" y="-16" fill="${DM}" font-size="8" font-family="monospace">${name}</text>`;

    // PMOS: same geometry but with bubble on gate wire
    // Bubble at cx=-14, gate wire exits left from bubble
    if (name.startsWith('PMOS')) return `
<line x1="-8" y1="-14" x2="-8" y2="14"  stroke="${CO}" stroke-width="2.2"/>
<line x1="-4" y1="-14" x2="-4" y2="14"  stroke="${CO}" stroke-width="2"/>
<line x1="-4" y1="-10" x2="8"  y2="-10" stroke="${CO}" stroke-width="1.5"/>
<line x1="-4" y1="0"   x2="8"  y2="0"   stroke="${CO}" stroke-width="1.5"/>
<line x1="-4" y1="10"  x2="8"  y2="10"  stroke="${CO}" stroke-width="1.5"/>
<circle cx="-13" cy="0" r="4" fill="${BG}" stroke="${CO}" stroke-width="1.4"/>
<line x1="-8"  y1="0"   x2="-9"  y2="0"  stroke="${W}" stroke-width="1.5"/>
<line x1="-17" y1="0"   x2="-26" y2="0"  stroke="${W}" stroke-width="1.5"/>
<line x1="8"   y1="-10" x2="8"  y2="-20" stroke="${W}" stroke-width="1.5"/>
<line x1="8"   y1="10"  x2="8"  y2="20"  stroke="${W}" stroke-width="1.5"/>
<text x="12" y="-16" fill="${DM}" font-size="8" font-family="monospace">${name}</text>`;

    // Generic IC block — 60×36 centred at 0,0
    return `
<rect x="-30" y="-18" width="60" height="36" rx="4" fill="${BG}" stroke="${CO}" stroke-width="1.5"/>
<text x="0" y="4" text-anchor="middle" fill="${TX}" font-size="8" font-family="monospace">${name.length>9?name.slice(0,9):name}</text>
<line x1="-48" y1="-9"  x2="-30" y2="-9"  stroke="${W}" stroke-width="1.5"/>
<line x1="-48" y1="9"   x2="-30" y2="9"   stroke="${W}" stroke-width="1.5"/>
<line x1="30"  y1="0"   x2="48"  y2="0"   stroke="${W}" stroke-width="1.5"/>`;
  }

  // Ghost shown while placing: a tiny pixel SVG matching the symbol aspect
  function elemGhostSVG(name) {
    if (name.startsWith('NMOS') || name.startsWith('PMOS'))
      return `<svg width="48" height="52" viewBox="-28 -26 48 52" xmlns="http://www.w3.org/2000/svg">${elemGContent(name)}</svg>`;
    return `<svg width="80" height="48" viewBox="-55 -26 110 52" xmlns="http://www.w3.org/2000/svg">${elemGContent(name)}</svg>`;
  }

  function confirmImport() {
    if (!selectedElem) return;
    document.getElementById('importDialog')?.remove();

    // Find the active schematic canvas in the topmost file-win
    const wins = [...document.querySelectorAll('.file-win')];
    const topWin = wins.sort((a,b) => +b.style.zIndex - +a.style.zIndex)[0];
    const canvas = topWin?.querySelector('.sch-preview');
    if (!canvas) return;

    // Enter placement mode — ghost follows mouse
    placingElem = { name: selectedElem };

    // Create ghost (pixel-sized preview that follows the cursor)
    const ghost = document.createElement('div');
    ghost.className = 'sch-ghost';
    ghost.innerHTML = elemGhostSVG(selectedElem);
    ghost.style.top = '-200px';
    ghost.style.left = '-200px';
    ghost.style.position = 'fixed';
    ghost.style.pointerEvents = 'none';
    ghost.style.zIndex = '500';
    document.body.appendChild(ghost);
    currentGhost = ghost;

    canvas.classList.add('placing');

    // Show hint
    const hint = document.createElement('div');
    hint.id = 'placeHint';
    hint.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#1e1a35;border:1px solid #5a3fcf;color:#c792ea;padding:8px 20px;border-radius:8px;font-size:12px;font-family:sans-serif;z-index:500;pointer-events:none';
    hint.textContent = 'Clic para colocar ' + selectedElem + ' · ESC para cancelar';
    document.body.appendChild(hint);

    function onMove(e) {
      if (!currentGhost) return;
      currentGhost.style.left = (e.clientX - 26) + 'px';
      currentGhost.style.top  = (e.clientY - 22) + 'px';
    }

    function onKey(e) {
      if (e.key === 'Escape') cancelPlacement(canvas, cleanup);
    }

    function cleanup() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('keydown', onKey);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('keydown', onKey);
  }

  function cancelPlacement(canvas, cleanup) {
    if (currentGhost) { currentGhost.remove(); currentGhost = null; }
    document.getElementById('placeHint')?.remove();
    canvas?.classList.remove('placing');
    placingElem = null;
    if (cleanup) cleanup();
  }

  function handleCanvasClick(e, canvas) {
    // ── Placement mode ────────────────────────────────────────────────────────
    if (placingElem) {
      const inner = canvas.querySelector('.sch-inner');
      const schSvgForCoords = canvas.querySelector('.sch-inner > div > svg') || canvas.querySelector('.sch-inner svg');
      const scale = parseFloat(inner?.dataset.scale || '1');
      // Use the SVG element's own bounding rect — already accounts for transform
      const svgRect = schSvgForCoords ? schSvgForCoords.getBoundingClientRect() : canvas.getBoundingClientRect();
      const vb = schSvgForCoords?.viewBox?.baseVal;
      const svgW = vb?.width || 320;
      const svgH = vb?.height || 220;
      const x = ((e.clientX - svgRect.left) / svgRect.width)  * svgW;
      const y = ((e.clientY - svgRect.top)  / svgRect.height) * svgH;

      // Inject <g> directly into the schematic SVG — same coordinate space
      // SVG is nested: .sch-inner > div > svg  (inside the padding div)
      const schSvg = canvas.querySelector('.sch-inner > div > svg') ||
                     canvas.querySelector('.sch-inner svg');
      if (schSvg) {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);
        g.setAttribute('class', 'sch-placed-elem');
        g.setAttribute('data-name', placingElem.name);
        g.style.cursor = 'move';
        g.innerHTML = elemGContent(placingElem.name);

        // Drag the <g> in SVG coords
        g.addEventListener('mousedown', ev => {
          if (wireMode) return;
          ev.stopPropagation();
          ev.preventDefault();
          const svgRect = schSvg.getBoundingClientRect();
          const sc = parseFloat(inner?.dataset.scale || '1');
          const ox2 = parseFloat(inner?.dataset.ox || '0');
          const oy2 = parseFloat(inner?.dataset.oy || '0');
          // Current transform
          const tr = g.getAttribute('transform').match(/translate\(([^,]+),([^)]+)\)/);
          let gx = parseFloat(tr[1]), gy = parseFloat(tr[2]);
          const startX = ev.clientX, startY = ev.clientY;
          function mv(ev2) {
            const dx = (ev2.clientX - startX) / sc;
            const dy = (ev2.clientY - startY) / sc;
            g.setAttribute('transform', `translate(${(gx+dx).toFixed(1)},${(gy+dy).toFixed(1)})`);
          }
          function up() {
            const tr2 = g.getAttribute('transform').match(/translate\(([^,]+),([^)]+)\)/);
            gx = parseFloat(tr2[1]); gy = parseFloat(tr2[2]);
            document.removeEventListener('mousemove', mv);
            document.removeEventListener('mouseup', up);
          }
          document.addEventListener('mousemove', mv);
          document.addEventListener('mouseup', up);
        });

        // Right-click to delete
        g.addEventListener('contextmenu', ev => { ev.preventDefault(); g.remove(); });

        schSvg.appendChild(g);
      }

      if (currentGhost) { currentGhost.remove(); currentGhost = null; }
      document.getElementById('placeHint')?.remove();
      canvas.classList.remove('placing');
      placingElem = null;
      return;
    }

    // ── Wire mode ─────────────────────────────────────────────────────────────
    if (wireMode) {
      const inner = canvas.querySelector('.sch-inner');
      const rect  = (inner || canvas).getBoundingClientRect();
      const scale = parseFloat(inner?.dataset.scale || '1');
      const ox = parseFloat(inner?.dataset.ox || '0');
      const oy = parseFloat(inner?.dataset.oy || '0');
      // Snap to 10px grid in schematic space
      const x = Math.round(((e.clientX - rect.left - ox) / scale) / 10) * 10;
      const y = Math.round(((e.clientY - rect.top  - oy) / scale) / 10) * 10;

      if (!wireStart) {
        wireStart = { x, y };
        // Show start dot
        const svg = canvas.querySelector('.sch-wire-canvas');
        if (svg) {
          const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
          dot.setAttribute('cx', x); dot.setAttribute('cy', y);
          dot.setAttribute('r', '4'); dot.setAttribute('fill', '#5a9cf5');
          dot.setAttribute('id', 'wireStartDot');
          svg.appendChild(dot);
        }
      } else {
        // Complete wire
        const svg = canvas.querySelector('.sch-wire-canvas');
        svg?.getElementById('wireStartDot')?.remove();
        svg?.getElementById('wirePreview')?.remove();
        if (svg) {
          const line = document.createElementNS('http://www.w3.org/2000/svg','path');
          // Route orthogonally
          const x1=wireStart.x, y1=wireStart.y, x2=x, y2=y;
          const mx = x2; // go horizontal first then vertical
          line.setAttribute('d', `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
          line.setAttribute('stroke', '#5a9cf5');
          line.setAttribute('stroke-width', '1.8');
          line.setAttribute('fill', 'none');
          // Add junction dots at corners
          const dot1 = document.createElementNS('http://www.w3.org/2000/svg','circle');
          dot1.setAttribute('cx', x1); dot1.setAttribute('cy', y1);
          dot1.setAttribute('r', '3'); dot1.setAttribute('fill', '#5a9cf5');
          const dot2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
          dot2.setAttribute('cx', x2); dot2.setAttribute('cy', y2);
          dot2.setAttribute('r', '3'); dot2.setAttribute('fill', '#5a9cf5');
          svg.appendChild(line);
          svg.appendChild(dot1);
          svg.appendChild(dot2);
        }
        wireStart = null;
      }
      return;
    }
  }

  // Wire preview follows mouse when first point is set
  document.addEventListener('mousemove', e => {
    if (!wireMode || !wireStart) return;
    const canvases = document.querySelectorAll('.sch-preview.wiring');
    canvases.forEach(canvas => {
      const inner = canvas.querySelector('.sch-inner');
      const rect = (inner || canvas).getBoundingClientRect();
      if (e.clientX < rect.left || e.clientX > rect.right) return;
      const svg = canvas.querySelector('.sch-wire-canvas');
      if (!svg) return;
      const scale = parseFloat(inner?.dataset.scale || '1');
      const ox = parseFloat(inner?.dataset.ox || '0');
      const oy = parseFloat(inner?.dataset.oy || '0');
      const x = Math.round(((e.clientX - rect.left - ox) / scale) / 10) * 10;
      const y = Math.round(((e.clientY - rect.top  - oy) / scale) / 10) * 10;
      let prev = svg.getElementById('wirePreview');
      if (!prev) {
        prev = document.createElementNS('http://www.w3.org/2000/svg','path');
        prev.setAttribute('id', 'wirePreview');
        prev.setAttribute('stroke', '#5a9cf5');
        prev.setAttribute('stroke-width', '1.5');
        prev.setAttribute('stroke-dasharray', '4,3');
        prev.setAttribute('fill', 'none');
        prev.setAttribute('opacity', '0.7');
        svg.appendChild(prev);
      }
      const x1=wireStart.x, y1=wireStart.y;
      prev.setAttribute('d', `M${x1},${y1} L${x},${y1} L${x},${y}`);
    });
  });

  function toggleWireMode(btn) {
    wireMode = !wireMode;
    wireStart = null;
    btn.classList.toggle('active', wireMode);
    // Apply/remove wiring class to all sch-preview canvases in the same win
    const win = btn.closest('.file-win');
    win?.querySelectorAll('.sch-preview').forEach(c => {
      c.classList.toggle('wiring', wireMode);
      c.style.cursor = wireMode ? 'crosshair' : 'grab';
    });
    if (!wireMode) {
      // Clean up preview line and start dot
      document.querySelectorAll('.sch-wire-canvas').forEach(svg => {
        svg.getElementById('wirePreview')?.remove();
        svg.getElementById('wireStartDot')?.remove();
      });
    }
  }

  function clearPlaced(btn) {
    const win = btn.closest('.file-win');
    win?.querySelectorAll('.sch-placed').forEach(el => el.remove());
    win?.querySelectorAll('.sch-wire-canvas').forEach(svg => {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
    });
    wireStart = null;
    wireMode = false;
    btn.closest('.sch-toolbar')?.querySelector('#wireModeBtn')?.classList.remove('active');
  }


  // ════════════════════════════════════════════════════════════════════════════
  // SHARED DRAG HELPER
  // ════════════════════════════════════════════════════════════════════════════
  function makeDraggable(win, handle) {
    handle.addEventListener('mousedown', e => {
      if (e.target.classList.contains('btn')) return;
      e.preventDefault();
      const r = win.getBoundingClientRect();
      const dx = e.clientX - r.left, dy = e.clientY - r.top;
      document.body.style.userSelect = 'none';
      document.body.style.pointerEvents = 'none';
      win.style.pointerEvents = 'all';
      function mv(ev) { win.style.left=(ev.clientX-dx)+'px'; win.style.top=(ev.clientY-dy)+'px'; }
      function up() {
        document.body.style.userSelect='';
        document.body.style.pointerEvents='';
        document.removeEventListener('mousemove',mv);
        document.removeEventListener('mouseup',up);
      }
      document.addEventListener('mousemove',mv);
      document.addEventListener('mouseup',up);
    });
  }


  // ════════════════════════════════════════════════════════════════════════════
  // LAYOUT CROSS-HIGHLIGHT
  // ════════════════════════════════════════════════════════════════════════════

  // Map transistor IDs to layout bounding boxes (% of viewBox 220×180)
  const LAYOUT_HIGHLIGHT_MAP = {
    diff_pair: {
      M1: { x: 20/220, y: 96/180, w: 70/220, h: 55/180, type: 'nmos' },
      M2: { x:126/220, y: 96/180, w: 70/220, h: 55/180, type: 'nmos' },
      M3: { x: 15/220, y: 15/180, w: 86/220, h: 64/180, type: 'pmos' },
      M4: { x:115/220, y: 15/180, w: 86/220, h: 64/180, type: 'pmos' },
    }
  };

  function buildLayoutOverlays(folder) {
    const map = LAYOUT_HIGHLIGHT_MAP[folder];
    if (!map) return '';
    return Object.entries(map).map(([id, r]) =>
      `<div class="layout-highlight ${r.type}" id="lh_${id}"
        style="left:${(r.x*100).toFixed(2)}%;top:${(r.y*100).toFixed(2)}%;width:${(r.w*100).toFixed(2)}%;height:${(r.h*100).toFixed(2)}%">
      </div>`
    ).join('');
  }

  let activeHighlight = null;

  function highlightLayout(id, type) {
    // Find any open layout window for the current folder
    const wins = [...document.querySelectorAll('.file-win')];
    wins.forEach(win => {
      // Clear all highlights in this window
      win.querySelectorAll('.layout-highlight').forEach(el => {
        el.classList.remove('active');
      });
      // Light up the matching one
      const target = win.querySelector(`#lh_${id}`);
      if (target) {
        if (activeHighlight === id) {
          // Second click on same transistor — toggle off
          activeHighlight = null;
        } else {
          target.classList.add('active');
          activeHighlight = id;
          // Pulse animation
          target.style.transition = 'none';
          target.style.opacity = '0';
          requestAnimationFrame(() => {
            target.style.transition = 'opacity 0.2s, box-shadow 0.3s';
            target.style.opacity = '1';
          });
        }
      }
    });
  }


  // ════════════════════════════════════════════════════════════════════════════
  // DRC / LVS CHECK WINDOWS
  // ════════════════════════════════════════════════════════════════════════════

  const LVS_RULES = {
    diff_pair: [
      { t:'ok',   m:'Netlist extracted from layout ............... OK' },
      { t:'ok',   m:'M1: NMOS W/L match (2μm/0.18μm) ............. MATCH' },
      { t:'ok',   m:'M2: NMOS W/L match (2μm/0.18μm) ............. MATCH' },
      { t:'ok',   m:'M3: PMOS W/L match (4μm/0.18μm) ............. MATCH' },
      { t:'ok',   m:'M4: PMOS W/L match (4μm/0.18μm) ............. MATCH' },
      { t:'ok',   m:'Node VDD: 2 connections ...................... MATCH' },
      { t:'ok',   m:'Node tail: 3 connections ..................... MATCH' },
      { t:'ok',   m:'Node vout+: 2 connections ................... MATCH' },
      { t:'ok',   m:'Node vout−: 2 connections ................... MATCH' },
      { t:'ok',   m:'Current source Iss .......................... MATCH' },
      { t:'ok',   m:'Port count schematic=6 layout=6 ............. MATCH' },
    ],
    pll_core: [
      { t:'ok',   m:'VCO subcircuit extracted .................... OK' },
      { t:'ok',   m:'PFD transistors matched ..................... MATCH' },
      { t:'warn', m:'LPF capacitor value: layout 9.8pF vs netlist 10pF .. WARNING' },
      { t:'ok',   m:'Divider cell matched ........................ MATCH' },
      { t:'ok',   m:'Port CLK_IN/CLK_OUT matched ................ MATCH' },
    ],
    chip_top_v3: [
      { t:'ok',   m:'PLL subcircuit matched ...................... MATCH' },
      { t:'ok',   m:'CPU subcircuit matched ...................... MATCH' },
      { t:'ok',   m:'MEM subcircuit matched ...................... MATCH' },
      { t:'ok',   m:'IO subcircuit matched ....................... MATCH' },
      { t:'warn', m:'Power domain VDD_IO unconnected in schematic . WARNING' },
      { t:'ok',   m:'Total devices: schematic=1842 layout=1842 ... MATCH' },
    ],
  };

  function openDRCLVSWindow(folder, title, rules, statusDotId, statusTxtId, isLVS, triggerBtn) {
    const winId = (isLVS ? 'lvsWin_' : 'drcWin_') + folder;
    const ex = document.getElementById(winId);
    if (ex) { ex.remove(); return; }

    const layer = document.getElementById('fileWindowsLayer');
    const win = document.createElement('div');
    win.className = 'drc-win';
    win.id = winId;
    win.style.left = '200px';
    win.style.top  = '100px';
    win.style.zIndex = ++winZBase;

    const errors = rules.filter(r=>r.t==='err').length;
    const warns  = rules.filter(r=>r.t==='warn').length;

    win.innerHTML = `
      <div class="drc-win-titlebar" id="drcTB_${winId}">
        <div class="traffic">
          <div class="btn btn-close" onclick="document.getElementById('${winId}').remove()"></div>
          <div class="btn btn-min"></div>
          <div class="btn btn-max"></div>
        </div>
        <span>${title}</span>
      </div>
      <div class="drc-win-toolbar">
        <div class="drc-status-dot ${errors>0?'error':warns>0?'warn':'pass'} idle" id="dotAnim_${winId}"></div>
        <span style="font-size:10.5px;color:#555577;font-family:monospace" id="statusAnim_${winId}">Ejecutando...</span>
        <div class="sch-tool-btn" style="margin-left:auto;font-size:10px" onclick="exportDRCLog('${winId}','${folder}','${isLVS?'lvs':'drc'}')">↓ Exportar log</div>
      </div>
      <div class="drc-win-log" id="drcLog_${winId}"></div>
    `;

    makeDraggable(win, win.querySelector('.drc-win-titlebar'));
    win.addEventListener('mousedown', () => win.style.zIndex = ++winZBase);
    layer.appendChild(win);

    // Animate log lines
    const log = win.querySelector('.drc-win-log');
    const dot = win.querySelector('.drc-status-dot');
    const statusTxt = win.querySelector(`#statusAnim_${winId}`);

    const header = isLVS
      ? [`<span class="drc-hdr">━━━ LVS Run: ${folder} ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`,
         `<span class="drc-hdr">Netlist: ${folder}.sp  |  Layout: ${folder}.gds</span>`, '']
      : [`<span class="drc-hdr">━━━ DRC Run: ${folder} ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`,
         `<span class="drc-hdr">Process: CMOS 0.18μm  |  Runset: full</span>`, ''];

    const ruleLines = rules.map(r => `<span class="drc-${r.t}">${r.m}</span>`);
    const summary = [
      '',
      `<span class="drc-hdr">━━━ Summary ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`,
      `<span class="drc-ok">  PASS:    ${rules.filter(r=>r.t==='ok').length}</span>`,
      warns  ? `<span class="drc-warn">  WARNING: ${warns}</span>` : '',
      errors ? `<span class="drc-err">  ERROR:   ${errors}</span>` : '',
      '',
      errors === 0
        ? `<span class="drc-ok">✓ ${isLVS?'LVS':'DRC'} CLEAN — no errors found</span>`
        : `<span class="drc-err">✗ ${isLVS?'LVS':'DRC'} FAILED — ${errors} error(s)</span>`,
    ].filter(l => l !== undefined);

    const allLines = [...header, ...ruleLines, ...summary];
    let i = 0;
    function addLine() {
      if (i >= allLines.length) {
        // Done — update status dot and text
        const finalDot = document.getElementById('dotAnim_' + winId);
        const finalTxt = document.getElementById('statusAnim_' + winId);
        const stateClass = errors>0 ? 'error' : warns>0 ? 'warn' : 'pass';
        const btnClass   = errors>0 ? 'failed' : warns>0 ? 'warned' : 'passed';
        if (finalDot) { finalDot.classList.remove('idle'); finalDot.className = 'drc-status-dot ' + stateClass; }
        if (finalTxt) { finalTxt.textContent = errors>0 ? `${errors} error(s)` : warns>0 ? `${warns} warning(s)` : 'Limpio'; finalTxt.style.color = errors>0?'#e06060':warns>0?'#e0a020':'#50d890'; }
        // Update toolbar status dot in layout window
        const sd = document.getElementById(statusDotId);
        const st = document.getElementById(statusTxtId);
        if (sd) { sd.classList.remove('idle'); sd.className = 'drc-status-dot ' + stateClass; }
        if (st) { st.textContent = errors>0?`${errors} error(s)`:warns>0?`${warns} warning(s)`:'✓ Clean'; st.style.color = errors>0?'#e06060':warns>0?'#e0a020':'#50d890'; }
        // Color the trigger button
        if (triggerBtn) { triggerBtn.classList.remove('passed','failed','warned'); triggerBtn.classList.add(btnClass); }
        return;
      }
      log.innerHTML += allLines[i] + '\n';
      log.scrollTop = log.scrollHeight;
      i++;
      setTimeout(addLine, 32);
    }
    addLine();
  }

  function runDRCWindow(folder, btn) {
    const rules = DRC_RULES[folder] || [
      { t:'ok', m:'Metal spacing check ............. PASS' },
      { t:'ok', m:'Poly width check ................ PASS' },
      { t:'ok', m:'Via enclosure check ............. PASS' },
    ];
    const dotId = 'drcStatusDot_' + folder;
    const txtId = 'drcStatusTxt_' + folder;
    openDRCLVSWindow(folder, `DRC — ${folder}.gds`, rules, dotId, txtId, false, btn);
  }

  function runLVSWindow(folder, btn) {
    const rules = LVS_RULES[folder] || [
      { t:'ok', m:'Devices matched ................. MATCH' },
      { t:'ok', m:'Nets matched .................... MATCH' },
      { t:'ok', m:'Ports matched ................... MATCH' },
    ];
    const dotId = 'drcStatusDot_' + folder;
    const txtId = 'drcStatusTxt_' + folder;
    openDRCLVSWindow(folder, `LVS — ${folder}.sp vs ${folder}.gds`, rules, dotId, txtId, true, btn);
  }

  function exportDRCLog(winId, folder, type) {
    const log = document.getElementById('drcLog_' + winId);
    if (!log) return;
    const text = log.innerText;
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
    a.download = `${folder}_${type}.log`;
    a.click();
  }

</script>
