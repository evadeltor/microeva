<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 1000px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Menlo', 'Monaco', 'SF Mono', 'Courier New', monospace;
  }

  .desktop {
    width: 1280px;
    height: 1000px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .window {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 0.5px rgba(0,0,0,0.18),
      0 2px 4px rgba(0,0,0,0.10),
      0 8px 24px rgba(0,0,0,0.16),
      0 24px 64px rgba(0,0,0,0.14);
    display: flex;
    flex-direction: column;
    animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes slideUp {
    from { transform: translateY(80px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }


  /* Title Bar */
  .titlebar {
    height: 38px;
    background: linear-gradient(180deg, #ececec 0%, #e0e0e0 100%);
    border-bottom: 1px solid #c0c0c0;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    user-select: none;
  }

  .titlebar-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12.5px;
    font-weight: 500;
    color: #4a4a4a;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  /* Traffic lights */
  .traffic {
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 1;
  }

  .btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    cursor: default;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-close {
    background: radial-gradient(circle at 40% 35%, #ff7b72, #e0443b);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-min {
    background: radial-gradient(circle at 40% 35%, #ffd55e, #e5a800);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-max {
    background: radial-gradient(circle at 40% 35%, #6fda6f, #28a428);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  /* Tabs bar */
  .tabbar {
    height: 32px;
    background: #e5e5e5;
    border-bottom: 1px solid #c8c8c8;
    display: flex;
    align-items: flex-end;
    padding: 0 12px;
    gap: 2px;
    flex-shrink: 0;
  }

  .tab {
    height: 26px;
    padding: 0 16px;
    border-radius: 6px 6px 0 0;
    font-size: 11.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: default;
    color: #888;
    background: transparent;
  }

  .tab.active {
    background: #f5f5f5;
    color: #333;
    border: 1px solid #c8c8c8;
    border-bottom: 1px solid #f5f5f5;
    font-weight: 500;
  }

  .tab-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #aaa;
  }
  .tab.active .tab-dot {
    background: #3d8af7;
  }

  /* Terminal body */
  .terminal-body {
    flex: 1;
    background: #f5f5f5;
    padding: 14px 16px;
    overflow-y: auto;
    overflow-x: hidden;
    font-size: 16px;
    line-height: 1.65;
    color: #1a1a1a;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }

  .terminal-body::-webkit-scrollbar { width: 8px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

  /* Terminal text styles */
  .line { display: flex; flex-wrap: wrap; align-items: baseline; margin-bottom: 0; white-space: pre-wrap; word-break: break-all; }

  .prompt-user  { color: #28a745; font-weight: 600; }
  .prompt-at    { color: #888; }
  .prompt-host  { color: #0077cc; font-weight: 600; }
  .prompt-path  { color: #8b5cf6; font-weight: 500; }
  .prompt-sym   { color: #555; }
  .cmd          { color: #1a1a1a; }
  .cmd-keyword  { color: #c8522a; font-weight: 600; }
  .cmd-flag     { color: #0077cc; }
  .cmd-string   { color: #2e7d32; }
  .cmd-path     { color: #8b5cf6; }

  .output       { color: #333; }
  .output-dim   { color: #888; }
  .output-blue  { color: #0077cc; }
  .output-green { color: #28a745; font-weight: 500; }
  .output-red   { color: #d32f2f; }
  .output-yellow{ color: #b37400; }
  .output-bold  { font-weight: 600; color: #1a1a1a; }

  .blank { height: 6px; }

  /* Input line with cursor */
  .input-line {
    display: flex;
    align-items: baseline;
    margin-top: 0;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 18px;
    background: #1a1a1a;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 1.1s step-start infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }


  /* ── Floating file window ── */
  .file-windows-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  .file-win {
    position: absolute;
    width: 700px;
    height: 500px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 0.5px rgba(0,0,0,0.3),
      0 8px 24px rgba(0,0,0,0.25),
      0 32px 80px rgba(0,0,0,0.35);
    pointer-events: all;
    animation: winPop 0.45s cubic-bezier(0.22,1,0.36,1) both;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  @keyframes winPop {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  .file-win-titlebar {
    height: 38px;
    background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%);
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    cursor: default;
    user-select: none;
  }

  .file-win-titlebar.dragging { cursor: grabbing; }

  .file-win-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 500;
    color: #d0d0d0;
    white-space: nowrap;
  }

  .file-win-body {
    flex: 1;
    background: #13131f;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .file-win-body .preview-wrap  { height: 100%; }
  .file-win-body .preview-header { font-size: 11px; }
  .file-win-body .preview-content { flex: 1; overflow: auto; }
  .file-win-body .code-preview { font-size: 12px; padding: 8px; }
  .file-win-body .sch-preview svg { width: 100%; height: 100%; }


  /* ── Transistor properties popup ── */
  .mos-props {
    position: fixed;
    width: 260px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.5);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    z-index: 300;
    pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .mos-props-title {
    -webkit-user-select: none;
    user-select: none;
  }

  .mos-props-title {
    height: 34px;
    background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
    border-bottom: 1px solid #111;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    cursor: default;
    user-select: none;
    position: relative;
  }

  .mos-props-title span {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11.5px;
    font-weight: 500;
    color: #d0d0d0;
    white-space: nowrap;
  }

  .mos-props-body {
    background: #1a1a2c;
    padding: 12px 14px 14px;
  }

  .mos-props-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }

  .mos-props-type.nmos { background: #1a3a5c; color: #5a9cf5; }
  .mos-props-type.pmos { background: #3a1a4a; color: #c792ea; }

  .mos-props-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid #252535;
    font-size: 11.5px;
  }

  .mos-props-row:last-child { border-bottom: none; }

  .mos-props-label { color: #666688; }

  .mos-props-val {
    color: #c0c0e0;
    font-family: 'Menlo', monospace;
    font-size: 11px;
    background: #111122;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid #2a2a3e;
    cursor: text;
    min-width: 80px;
    text-align: right;
  }

  .mos-props-val:focus {
    outline: none;
    border-color: #a07cff;
    color: #fff;
  }

  .mos-props-section {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #444466;
    margin: 10px 0 4px;
  }


  /* ── Zoom on schematic ── */
  .sch-zoomable { cursor: grab; overflow: hidden; width: 100%; height: 100%; }
  .sch-zoomable.grabbing { cursor: grabbing; }
  .sch-zoomable svg { transform-origin: 0 0; transition: none; }

  /* ── DRC log ── */
  .drc-log {
    width: 100%; height: 100%;
    font-family: 'Menlo','Monaco',monospace;
    font-size: 11px;
    line-height: 1.7;
    color: #a0a0c0;
    white-space: pre;
    overflow-y: auto;
    padding: 12px 14px;
    background: #13131f;
  }
  .drc-ok   { color: #50d890; }
  .drc-warn { color: #e0a020; }
  .drc-err  { color: #e06060; }
  .drc-hdr  { color: #a07cff; font-weight: bold; }

  /* ── Simulation setup window ── */
  .sim-win {
    position: fixed;
    width: 480px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.35), 0 12px 40px rgba(0,0,0,0.55);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 350;
    pointer-events: all;
    animation: winPop 0.35s cubic-bezier(0.22,1,0.36,1) both;
    background: #1a1a2c;
  }
  .sim-win-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .sim-win-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0; white-space: nowrap;
  }
  .sim-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .sim-section { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #555577; text-transform: uppercase; margin-bottom: 4px; }
  .sim-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #a0a0c0; }
  .sim-row label { width: 110px; flex-shrink: 0; }
  .sim-select, .sim-input {
    flex: 1; background: #111122; border: 1px solid #2a2a3e; border-radius: 6px;
    color: #c0c0e0; font-size: 11.5px; font-family: 'Menlo',monospace;
    padding: 5px 9px; outline: none;
  }
  .sim-select:focus, .sim-input:focus { border-color: #a07cff; }
  .sim-checkbox-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sim-check {
    display: flex; align-items: center; gap: 5px;
    background: #111122; border: 1px solid #2a2a3e; border-radius: 6px;
    padding: 4px 10px; font-size: 11px; color: #9090b0; cursor: pointer;
  }
  .sim-check input { accent-color: #a07cff; }
  .sim-check.checked { border-color: #a07cff; color: #c792ea; background: #1e1a30; }
  .sim-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 0 16px 14px; }
  .sim-btn {
    padding: 6px 18px; border-radius: 7px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none;
  }
  .sim-btn.cancel { background: #2a2a3e; color: #888; }
  .sim-btn.run    { background: #5a3fcf; color: #fff; }
  .sim-btn.run:hover { background: #6b4fe0; }

  /* ── Results / waveform window ── */
  .results-win {
    position: fixed;
    width: 620px; height: 420px;
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.35), 0 12px 40px rgba(0,0,0,0.55);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 350; pointer-events: all;
    animation: winPop 0.35s cubic-bezier(0.22,1,0.36,1) both;
    background: #13131f;
  }
  .results-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .results-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0; white-space: nowrap;
  }
  .results-tabs {
    display: flex; gap: 0; border-bottom: 1px solid #1e1e30;
    background: #111120; flex-shrink: 0;
  }
  .results-tab {
    padding: 7px 18px; font-size: 11.5px; color: #666688; cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .results-tab.active { color: #c792ea; border-bottom-color: #a07cff; }
  .results-content { flex: 1; overflow: hidden; }
  .waveform-canvas { width: 100%; height: 100%; display: block; }

  /* ── Sim file option ── */
  .file-option-icon.sim { background: #1a3a3a; }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 20px; border-radius: 10px;
    background: #2a2a3e; cursor: pointer; transition: background 0.3s;
    border: 1px solid #3a3a55;
  }
  .theme-toggle.light-mode { background: #b8d4f0; border-color: #8ab0d0; }
  .theme-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #666; transition: all 0.3s;
  }
  .theme-toggle.light-mode::after { left: 18px; background: #fff; }

  /* ── Light theme for app panels ── */
  .app-panels.light { background: #f0f0f5; }
  .panel-top.light  { background: #f0f0f5; border-bottom-color: #d0d0e0; }
  .panel-left.light { background: #f5f5fa; border-right-color: #d0d0e0; }
  .panel-right.light{ background: #f5f5fa; }
  .panel-left.light .panel-section-title { color: #9090b0; }
  .panel-left.light .file-option  { background: #eeeef5; border-color: #d0d0e0; }
  .panel-left.light .file-option-label { color: #333; }
  .panel-left.light .file-option-ext   { color: #888; }
  .panel-left.light .panel-left-empty  { color: #bbb; }
  .panel-right.light .preview-empty    { color: #bbb; }
  .folder.light .folder-name           { color: #1a1a2e; font-weight: 600; }
  .panel-top.light .folder-name        { color: #1a1a2e; font-weight: 600; }

  /* Light theme — file-option icons */
  .light .file-option-icon.sch  { background: #bcd8f5; color: #1a6ab0; }
  .light .file-option-icon.lay  { background: #b8e8cc; color: #1a7a40; }
  .light .file-option-icon.vhdl { background: #e0c8f0; color: #7030a0; }
  .light .file-option-icon.vlog { background: #f5ddb8; color: #8a4a00; }
  .light .file-option-icon.sim  { background: #b8e8e8; color: #0a6a6a; }


  /* ── Schematic toolbar (shown in full file-win only) ── */
  .sch-toolbar {
    height: 34px;
    background: #161624;
    border-bottom: 1px solid #1e1e30;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    flex-shrink: 0;
    user-select: none;
  }
  .sch-tool-btn {
    height: 24px;
    padding: 0 10px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #2a2a3e;
    background: #1e1e30;
    color: #9090b0;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .sch-tool-btn:hover { background: #252540; border-color: #3a3a55; color: #c0c0d8; }
  .sch-tool-btn.primary { background: #2a1e50; border-color: #5a3fcf; color: #a07cff; }
  .sch-tool-btn.primary:hover { background: #341e60; }
  .sch-tool-sep { width: 1px; height: 18px; background: #2a2a3e; margin: 0 3px; }
  .sch-breadcrumb {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    color: #444466;
  }
  .sch-bc-item {
    color: #6060a0;
    cursor: pointer;
  }
  .sch-bc-item:hover { color: #a07cff; text-decoration: underline; }
  .sch-bc-cur { color: #a0a0c0; }
  .sch-bc-sep { color: #333355; }

  /* ── Import element dialog ── */
  .import-win {
    position: fixed;
    width: 540px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.6);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 360;
    pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
    background: #1a1a2c;
  }
  .import-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .import-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0;
  }
  .import-body {
    display: flex;
    height: 360px;
    overflow: hidden;
  }
  .import-sidebar {
    width: 160px;
    background: #111120;
    border-right: 1px solid #1e1e30;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .import-lib-hdr {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #333355;
    padding: 10px 12px 4px;
  }
  .import-lib-item {
    padding: 7px 12px;
    font-size: 12px;
    color: #6060a0;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .import-lib-item:hover { background: #1a1a30; color: #a0a0c0; }
  .import-lib-item.active { background: #1e1a35; color: #a07cff; }
  .import-lib-icon { font-size: 14px; }
  .import-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .import-search {
    padding: 10px 12px;
    border-bottom: 1px solid #1e1e30;
    flex-shrink: 0;
  }
  .import-search input {
    width: 100%;
    background: #111122;
    border: 1px solid #2a2a3e;
    border-radius: 6px;
    color: #c0c0e0;
    font-size: 11.5px;
    padding: 5px 10px;
    outline: none;
    font-family: inherit;
  }
  .import-search input:focus { border-color: #a07cff; }
  .import-panels {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .import-elem-list {
    width: 180px;
    border-right: 1px solid #1e1e30;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .import-elem-item {
    padding: 7px 12px;
    font-size: 11.5px;
    color: #7070a0;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid #141422;
  }
  .import-elem-item:hover { background: #1a1a30; color: #c0c0d8; }
  .import-elem-item.active { background: #1e1a35; color: #c792ea; }
  .import-elem-badge {
    font-size: 9px;
    background: #252540;
    border: 1px solid #3a3a55;
    color: #6060a0;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: auto;
  }
  .import-elem-badge.nmos { background: #1a2a3a; border-color: #3a6a8a; color: #5a9cf5; }
  .import-elem-badge.pmos { background: #2a1a3a; border-color: #6a3a8a; color: #c792ea; }
  .import-elem-badge.pass { background: #1a3a1a; border-color: #3a6a3a; color: #50d890; }
  .import-props-panel {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .import-props-title {
    font-size: 13px;
    font-weight: 600;
    color: #c0c0e0;
    margin-bottom: 4px;
  }
  .import-props-desc {
    font-size: 10.5px;
    color: #555577;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .import-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid #1e1e30;
    flex-shrink: 0;
  }

  /* ── Netlist window ── */
  .netlist-win {
    position: fixed;
    width: 520px; height: 400px;
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.6);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 360; pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
    background: #13131f;
  }
  .netlist-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .netlist-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0;
  }
  .netlist-toolbar {
    height: 30px;
    background: #111120;
    border-bottom: 1px solid #1e1e30;
    display: flex; align-items: center; padding: 0 10px; gap: 8px;
    flex-shrink: 0;
  }
  .netlist-code {
    flex: 1;
    overflow-y: auto;
    font-family: 'Menlo','Monaco',monospace;
    font-size: 11px;
    line-height: 1.7;
    color: #a0a0c0;
    white-space: pre;
    padding: 12px 16px;
    background: #0e0e1a;
  }
  .nl-comment { color: #546e7a; }
  .nl-kw      { color: #c792ea; }
  .nl-id      { color: #82aaff; }
  .nl-val     { color: #c3e88d; }
  .nl-node    { color: #ffcb6b; }

  /* ── Element placement ghost ── */
  .sch-ghost {
    position: absolute;
    pointer-events: none;
    opacity: 0.65;
    z-index: 10;
  }
  .sch-preview.placing { cursor: crosshair !important; }
  .sch-preview.wiring  { cursor: crosshair !important; }

  /* ── Wire mode button active state ── */
  .sch-tool-btn.active {
    background: #1e1a35 !important;
    border-color: #a07cff !important;
    color: #c792ea !important;
  }
  .sch-tool-btn.passed {
    background: #0e2a1a !important;
    border-color: #50d890 !important;
    color: #50d890 !important;
  }
  .sch-tool-btn.failed {
    background: #2a0e0e !important;
    border-color: #e06060 !important;
    color: #e06060 !important;
  }
  .sch-tool-btn.warned {
    background: #2a1e0a !important;
    border-color: #e0a020 !important;
    color: #e0a020 !important;
  }

  /* ── Placed element drag handle ── */
  .sch-placed {
    position: absolute;
    cursor: move;
    user-select: none;
  }
  .sch-placed:hover > svg rect[data-ic],
  .sch-placed:hover > svg polygon {
    filter: brightness(1.3);
  }

  /* ── Wire overlay canvas ── */
  .sch-wire-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* ── Layout cross-highlight ── */
  .layout-highlight {
    position: absolute;
    pointer-events: none;
    border-radius: 3px;
    border: 2px solid transparent;
    box-shadow: 0 0 0 0 transparent;
    transition: opacity 0.25s, box-shadow 0.25s;
    opacity: 0;
    z-index: 4;
  }
  .layout-highlight.active {
    opacity: 1;
  }
  .layout-highlight.nmos {
    background: rgba(90, 156, 245, 0.18);
    border-color: #5a9cf5;
    box-shadow: 0 0 12px 3px rgba(90,156,245,0.4);
  }
  .layout-highlight.pmos {
    background: rgba(199, 146, 234, 0.18);
    border-color: #c792ea;
    box-shadow: 0 0 12px 3px rgba(199,146,234,0.4);
  }

  /* ── DRC/LVS results panel ── */
  .drc-win {
    position: fixed;
    width: 480px; height: 380px;
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.6);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 360; pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
    background: #13131f;
  }
  .drc-win-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .drc-win-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0; white-space: nowrap;
  }
  .drc-win-tabs {
    display: flex; border-bottom: 1px solid #1e1e30;
    background: #111120; flex-shrink: 0;
  }
  .drc-win-tab {
    padding: 7px 18px; font-size: 11.5px; color: #666688; cursor: pointer;
    border-bottom: 2px solid transparent; user-select: none;
  }
  .drc-win-tab.active { color: #c792ea; border-bottom-color: #a07cff; }
  .drc-win-toolbar {
    height: 30px; background: #0f0f1e;
    border-bottom: 1px solid #1a1a2c;
    display: flex; align-items: center; padding: 0 10px; gap: 8px;
    flex-shrink: 0;
  }
  .drc-status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .drc-status-dot.pass  { background: #50d890; box-shadow: 0 0 6px #50d890; }
  .drc-status-dot.error { background: #e06060; box-shadow: 0 0 6px #e06060; }
  .drc-status-dot.warn  { background: #e0a020; box-shadow: 0 0 6px #e0a020; }
  .drc-status-dot.idle  { background: #333355; }
  .drc-win-log {
    flex: 1; overflow-y: auto;
    font-family: 'Menlo','Monaco',monospace;
    font-size: 11px; line-height: 1.8;
    color: #a0a0c0; white-space: pre;
    padding: 10px 14px;
    background: #0e0e1a;
  }
  /* Selection indicator */
  .sel { background: #c2d9ff; border-radius: 2px; }

  /* ── App window overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }

  .app-window {
    width: 860px;
    height: 620px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 0.5px rgba(0,0,0,0.22),
      0 4px 12px rgba(0,0,0,0.12),
      0 16px 48px rgba(0,0,0,0.22),
      0 40px 100px rgba(0,0,0,0.18);
    opacity: 0;
    transform: scale(0.94) translateY(24px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .app-window.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: all;
  }

  .app-titlebar {
    height: 40px;
    background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%);
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    user-select: none;
  }

  .app-titlebar-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 500;
    color: #e0e0e0;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  /* Three-panel layout */
  .app-panels {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #1e1e2e;
    overflow: hidden;
  }

  .panel-top {
    height: 38%;
    background: #1e1e2e;
    border-bottom: 1.5px solid #2a2a3e;
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 4px;
    padding: 16px 18px;
    overflow-y: auto;
  }

  .folder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    width: 80px;
    padding: 8px 4px 7px;
    border-radius: 8px;
    cursor: default;
    transition: background 0.15s;
  }

  .folder:hover { background: rgba(160,124,255,0.12); }
  .folder.selected { background: rgba(160,124,255,0.22); }

  .folder-icon { width: 42px; height: 34px; }
  .folder-icon svg { width: 100%; height: 100%; }

  .folder-name {
    font-size: 11px;
    color: #c0c0d8;
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .panel-bottom {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .panel-left {
    flex: 1;
    background: #1e1e2e;
    border-right: 1.5px solid #2a2a3e;
    display: flex;
    flex-direction: column;
    padding: 16px 14px;
    gap: 6px;
    overflow-y: auto;
  }

  .panel-left-empty {
    color: #3a3a55;
    font-size: 12px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    margin: auto;
    text-align: center;
    user-select: none;
  }

  .file-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: default;
    transition: background 0.15s;
    border: 1px solid #2a2a3e;
    background: #191926;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .file-option:hover { background: #222238; border-color: #3a3a55; }

  .file-option-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .file-option-icon.sch  { background: #1a3a5c; }
  .file-option-icon.lay  { background: #1a3a2a; }
  .file-option-icon.vhdl { background: #3a1a4a; }
  .file-option-icon.vlog { background: #3a2a10; }

  .file-option-label {
    font-size: 13px;
    font-weight: 500;
    color: #c0c0d8;
    letter-spacing: 0.01em;
  }

  .file-option-ext {
    margin-left: auto;
    font-size: 10px;
    color: #555577;
    letter-spacing: 0.05em;
  }

  .panel-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #444466;
    text-transform: uppercase;
    padding: 0 2px 4px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    border-bottom: 1px solid #222234;
    margin-bottom: 2px;
  }

  .panel-right {
    flex: 1;
    background: #1e1e2e;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Preview area ── */
  .preview-empty {
    color: #2e2e44;
    font-size: 12px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    text-align: center;
    user-select: none;
  }

  .preview-wrap {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeInPreview 0.25s ease both;
  }

  @keyframes fadeInPreview {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .preview-header {
    padding: 8px 14px;
    border-bottom: 1px solid #2a2a3e;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #555577;
    text-transform: uppercase;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    flex-shrink: 0;
  }

  .preview-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Schematic SVG preview */
  .sch-preview svg { width: 100%; height: 100%; }

  /* Code preview (VHDL / Verilog) */
  .code-preview {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    font-family: 'Menlo', 'Monaco', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: #a0a0c0;
    scrollbar-width: thin;
    scrollbar-color: #2a2a3e transparent;
    white-space: pre;
  }

  .code-preview .kw  { color: #c792ea; }
  .code-preview .ty  { color: #82aaff; }
  .code-preview .str { color: #c3e88d; }
  .code-preview .cm  { color: #546e7a; }
  .code-preview .nm  { color: #ffcb6b; }

  /* Layout GDS grid */
  .layout-preview svg { width: 100%; height: 100%; }


  /* ── Floating file window ── */
  .file-windows-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  .file-win {
    position: absolute;
    width: 700px;
    height: 500px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 0.5px rgba(0,0,0,0.3),
      0 8px 24px rgba(0,0,0,0.25),
      0 32px 80px rgba(0,0,0,0.35);
    pointer-events: all;
    animation: winPop 0.45s cubic-bezier(0.22,1,0.36,1) both;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  @keyframes winPop {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  .file-win-titlebar {
    height: 38px;
    background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%);
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    cursor: default;
    user-select: none;
  }

  .file-win-titlebar.dragging { cursor: grabbing; }

  .file-win-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 500;
    color: #d0d0d0;
    white-space: nowrap;
  }

  .file-win-body {
    flex: 1;
    background: #13131f;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .file-win-body .preview-wrap  { height: 100%; }
  .file-win-body .preview-header { font-size: 11px; }
  .file-win-body .preview-content { flex: 1; overflow: auto; }
  .file-win-body .code-preview { font-size: 12px; padding: 8px; }
  .file-win-body .sch-preview svg { width: 100%; height: 100%; }


  /* ── Transistor properties popup ── */
  .mos-props {
    position: fixed;
    width: 260px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.5);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    z-index: 300;
    pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .mos-props-title {
    -webkit-user-select: none;
    user-select: none;
  }

  .mos-props-title {
    height: 34px;
    background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
    border-bottom: 1px solid #111;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    cursor: default;
    user-select: none;
    position: relative;
  }

  .mos-props-title span {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11.5px;
    font-weight: 500;
    color: #d0d0d0;
    white-space: nowrap;
  }

  .mos-props-body {
    background: #1a1a2c;
    padding: 12px 14px 14px;
  }

  .mos-props-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }

  .mos-props-type.nmos { background: #1a3a5c; color: #5a9cf5; }
  .mos-props-type.pmos { background: #3a1a4a; color: #c792ea; }

  .mos-props-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid #252535;
    font-size: 11.5px;
  }

  .mos-props-row:last-child { border-bottom: none; }

  .mos-props-label { color: #666688; }

  .mos-props-val {
    color: #c0c0e0;
    font-family: 'Menlo', monospace;
    font-size: 11px;
    background: #111122;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid #2a2a3e;
    cursor: text;
    min-width: 80px;
    text-align: right;
  }

  .mos-props-val:focus {
    outline: none;
    border-color: #a07cff;
    color: #fff;
  }

  .mos-props-section {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #444466;
    margin: 10px 0 4px;
  }


  /* ── Zoom on schematic ── */
  .sch-zoomable { cursor: grab; overflow: hidden; width: 100%; height: 100%; }
  .sch-zoomable.grabbing { cursor: grabbing; }
  .sch-zoomable svg { transform-origin: 0 0; transition: none; }

  /* ── DRC log ── */
  .drc-log {
    width: 100%; height: 100%;
    font-family: 'Menlo','Monaco',monospace;
    font-size: 11px;
    line-height: 1.7;
    color: #a0a0c0;
    white-space: pre;
    overflow-y: auto;
    padding: 12px 14px;
    background: #13131f;
  }
  .drc-ok   { color: #50d890; }
  .drc-warn { color: #e0a020; }
  .drc-err  { color: #e06060; }
  .drc-hdr  { color: #a07cff; font-weight: bold; }

  /* ── Simulation setup window ── */
  .sim-win {
    position: fixed;
    width: 480px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.35), 0 12px 40px rgba(0,0,0,0.55);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 350;
    pointer-events: all;
    animation: winPop 0.35s cubic-bezier(0.22,1,0.36,1) both;
    background: #1a1a2c;
  }
  .sim-win-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .sim-win-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0; white-space: nowrap;
  }
  .sim-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .sim-section { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #555577; text-transform: uppercase; margin-bottom: 4px; }
  .sim-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #a0a0c0; }
  .sim-row label { width: 110px; flex-shrink: 0; }
  .sim-select, .sim-input {
    flex: 1; background: #111122; border: 1px solid #2a2a3e; border-radius: 6px;
    color: #c0c0e0; font-size: 11.5px; font-family: 'Menlo',monospace;
    padding: 5px 9px; outline: none;
  }
  .sim-select:focus, .sim-input:focus { border-color: #a07cff; }
  .sim-checkbox-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sim-check {
    display: flex; align-items: center; gap: 5px;
    background: #111122; border: 1px solid #2a2a3e; border-radius: 6px;
    padding: 4px 10px; font-size: 11px; color: #9090b0; cursor: pointer;

  .sim-check input { accent-color: #a07cff; }
  .sim-check.checked { border-color: #a07cff; color: #c792ea; background: #1e1a30; }
  .sim-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 0 16px 14px; }
  .sim-btn {

  .sim-btn.cancel { background: #2a2a3e; color: #888; }
  .sim-btn.run    { background: #5a3fcf; color: #fff; }

  /* ── Results / waveform window ── */
  .results-win {
    position: fixed;
    width: 620px; height: 420px;
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.35), 0 12px 40px rgba(0,0,0,0.55);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 350; pointer-events: all;
    animation: winPop 0.35s cubic-bezier(0.22,1,0.36,1) both;
    background: #13131f;
  }
  .results-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .results-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0; white-space: nowrap;
  }
  .results-tabs {
    display: flex; gap: 0; border-bottom: 1px solid #1e1e30;
    background: #111120; flex-shrink: 0;
  }
  .results-tab {
    padding: 7px 18px; font-size: 11.5px; color: #666688; cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .results-tab.active { color: #c792ea; border-bottom-color: #a07cff; }
  .results-content { flex: 1; overflow: hidden; }
  .waveform-canvas { width: 100%; height: 100%; display: block; }

  /* ── Sim file option ── */
  .file-option-icon.sim { background: #1a3a3a; }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 20px; border-radius: 10px;
    background: #2a2a3e; cursor: pointer; transition: background 0.3s;
    border: 1px solid #3a3a55;
  }
  .theme-toggle.light-mode { background: #b8d4f0; border-color: #8ab0d0; }
  .theme-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #666; transition: all 0.3s;
  }
  .theme-toggle.light-mode::after { left: 18px; background: #fff; }

  /* ── Light theme for app panels ── */
  .app-panels.light { background: #f0f0f5; }
  .panel-top.light  { background: #f0f0f5; border-bottom-color: #d0d0e0; }
  .panel-left.light { background: #f5f5fa; border-right-color: #d0d0e0; }
  .panel-right.light{ background: #f5f5fa; }
  .panel-left.light .panel-section-title { color: #9090b0; }
  .panel-left.light .file-option  { background: #eeeef5; border-color: #d0d0e0; }
  .panel-left.light .file-option-label { color: #333; }
  .panel-left.light .file-option-ext   { color: #888; }
  .panel-left.light .panel-left-empty  { color: #bbb; }
  .panel-right.light .preview-empty    { color: #bbb; }
  .folder.light .folder-name           { color: #1a1a2e; font-weight: 600; }
  .panel-top.light .folder-name        { color: #1a1a2e; font-weight: 600; }

  /* Light theme — file-option icons */
  .light .file-option-icon.sch  { background: #bcd8f5; color: #1a6ab0; }
  .light .file-option-icon.lay  { background: #b8e8cc; color: #1a7a40; }
  .light .file-option-icon.vhdl { background: #e0c8f0; color: #7030a0; }
  .light .file-option-icon.vlog { background: #f5ddb8; color: #8a4a00; }
  .light .file-option-icon.sim  { background: #b8e8e8; color: #0a6a6a; }


  /* ── Schematic toolbar (shown in full file-win only) ── */
  .sch-toolbar {
    height: 34px;
    background: #161624;
    border-bottom: 1px solid #1e1e30;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    flex-shrink: 0;
    user-select: none;
  }
  .sch-tool-btn {
    height: 24px;
    padding: 0 10px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #2a2a3e;
    background: #1e1e30;
    color: #9090b0;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .sch-tool-btn:hover { background: #252540; border-color: #3a3a55; color: #c0c0d8; }
  .sch-tool-btn.primary { background: #2a1e50; border-color: #5a3fcf; color: #a07cff; }
  .sch-tool-btn.primary:hover { background: #341e60; }
  .sch-tool-sep { width: 1px; height: 18px; background: #2a2a3e; margin: 0 3px; }
  .sch-breadcrumb {
    margin-left: auto;

    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    color: #444466;
  }
  .sch-bc-item {
    color: #6060a0;
    cursor: pointer;
  }
  .sch-bc-item:hover { color: #a07cff; text-decoration: underline; }
  .sch-bc-cur { color: #a0a0c0; }
  .sch-bc-sep { color: #333355; }

  /* ── Import element dialog ── */
  .import-win {
    position: fixed;
    width: 540px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.6);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 360;
    pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;

  }

    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;

  }
  .import-body {
    display: flex;

  .import-lib-hdr {

  .import-lib-item {
    padding: 7px 12px;
    font-size: 12px;
    color: #6060a0;
    cursor: pointer;
    display: flex;
    align-items: center;

  }
  .import-lib-item:hover { background: #1a1a30; color: #a0a0c0; }
  .import-lib-item.active { background: #1e1a35; color: #a07cff; }
  .import-lib-icon { font-size: 14px; }
  .import-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .import-search {
    padding: 10px 12px;
    border-bottom: 1px solid #1e1e30;
    flex-shrink: 0;
  }
  .import-search input {
    width: 100%;
    background: #111122;
    border: 1px solid #2a2a3e;
    border-radius: 6px;
    color: #c0c0e0;
    font-size: 11.5px;
    padding: 5px 10px;
    outline: none;
    font-family: inherit;

  .import-search input:focus { border-color: #a07cff; }
  .import-panels {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .import-elem-list {
    width: 180px;
    border-right: 1px solid #1e1e30;
    overflow-y: auto;

  .import-elem-item {
    padding: 7px 12px;

  .import-elem-item:hover { background: #1a1a30; color: #c0c0d8; }
  .import-elem-item.active { background: #1e1a35; color: #c792ea; }
  .import-elem-badge {
    font-size: 9px;
    background: #252540;
    border: 1px solid #3a3a55;
    color: #6060a0;

  }
  .import-elem-badge.nmos { background: #1a2a3a; border-color: #3a6a8a; color: #5a9cf5; }
  .import-elem-badge.pmos { background: #2a1a3a; border-color: #6a3a8a; color: #c792ea; }
  .import-elem-badge.pass { background: #1a3a1a; border-color: #3a6a3a; color: #50d890; }
  .import-props-panel {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .import-props-title {
    font-size: 13px;
    font-weight: 600;
    color: #c0c0e0;
    margin-bottom: 4px;
  }
  .import-props-desc {
    font-size: 10.5px;
    color: #555577;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .import-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid #1e1e30;
    flex-shrink: 0;
  }

  /* ── Netlist window ── */
  .netlist-win {
    position: fixed;
    width: 520px; height: 400px;
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.6);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 360; pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
    background: #13131f;
  }
  .netlist-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .netlist-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0;
  }
  .netlist-toolbar {
    height: 30px;
    background: #111120;
    border-bottom: 1px solid #1e1e30;
    display: flex; align-items: center; padding: 0 10px; gap: 8px;
    flex-shrink: 0;
  }
  .netlist-code {
    flex: 1;
    overflow-y: auto;
    font-family: 'Menlo','Monaco',monospace;
    font-size: 11px;
    line-height: 1.7;
    color: #a0a0c0;
    white-space: pre;
    padding: 12px 16px;
    background: #0e0e1a;
  }
  .nl-comment { color: #546e7a; }
  .nl-kw      { color: #c792ea; }
  .nl-id      { color: #82aaff; }
  .nl-val     { color: #c3e88d; }
  .nl-node    { color: #ffcb6b; }

  /* ── Element placement ghost ── */
  .sch-ghost {
    position: absolute;
    pointer-events: none;
    opacity: 0.65;
    z-index: 10;
  }
  .sch-preview.placing { cursor: crosshair !important; }
  .sch-preview.wiring  { cursor: crosshair !important; }

  /* ── Wire mode button active state ── */
  .sch-tool-btn.active {
    background: #1e1a35 !important;
    border-color: #a07cff !important;
    color: #c792ea !important;
  }
  .sch-tool-btn.passed {
    background: #0e2a1a !important;
    border-color: #50d890 !important;
    color: #50d890 !important;
  }
  .sch-tool-btn.failed {
    background: #2a0e0e !important;
    border-color: #e06060 !important;
    color: #e06060 !important;
  }
  .sch-tool-btn.warned {
    background: #2a1e0a !important;
    border-color: #e0a020 !important;
    color: #e0a020 !important;
  }

  /* ── Placed element drag handle ── */
  .sch-placed {
    position: absolute;
    cursor: move;
    user-select: none;
  }
  .sch-placed:hover > svg rect[data-ic],
  .sch-placed:hover > svg polygon {
    filter: brightness(1.3);
  }

  /* ── Wire overlay canvas ── */
  .sch-wire-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* ── Layout cross-highlight ── */
  .layout-highlight {
    position: absolute;
    pointer-events: none;
    border-radius: 3px;
    border: 2px solid transparent;
    box-shadow: 0 0 0 0 transparent;
    transition: opacity 0.25s, box-shadow 0.25s;
    opacity: 0;
    z-index: 4;
  }
  .layout-highlight.active {
    opacity: 1;
  }
  .layout-highlight.nmos {
    background: rgba(90, 156, 245, 0.18);
    border-color: #5a9cf5;
    box-shadow: 0 0 12px 3px rgba(90,156,245,0.4);
  }
  .layout-highlight.pmos {
    background: rgba(199, 146, 234, 0.18);
    border-color: #c792ea;
    box-shadow: 0 0 12px 3px rgba(199,146,234,0.4);
  }

  /* ── DRC/LVS results panel ── */
  .drc-win {
    position: fixed;
    width: 480px; height: 380px;
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.6);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    z-index: 360; pointer-events: all;
    animation: winPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
    background: #13131f;
  }
  .drc-win-titlebar {
    height: 38px;
    background: linear-gradient(180deg,#3a3a3c,#2c2c2e);
    border-bottom: 1px solid #111;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    flex-shrink: 0; cursor: default; user-select: none; position: relative;
  }
  .drc-win-titlebar span {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 500; color: #d0d0d0; white-space: nowrap;
  }
  .drc-win-tabs {
    display: flex; border-bottom: 1px solid #1e1e30;
    background: #111120; flex-shrink: 0;
  }
  .drc-win-tab {
    padding: 7px 18px; font-size: 11.5px; color: #666688; cursor: pointer;
    border-bottom: 2px solid transparent; user-select: none;
  }
  .drc-win-tab.active { color: #c792ea; border-bottom-color: #a07cff; }
  .drc-win-toolbar {
    height: 30px; background: #0f0f1e;
    border-bottom: 1px solid #1a1a2c;
    display: flex; align-items: center; padding: 0 10px; gap: 8px;
    flex-shrink: 0;
  }
  .drc-status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .drc-status-dot.pass  { background: #50d890; box-shadow: 0 0 6px #50d890; }
  .drc-status-dot.error { background: #e06060; box-shadow: 0 0 6px #e06060; }
  .drc-status-dot.warn  { background: #e0a020; box-shadow: 0 0 6px #e0a020; }
  .drc-status-dot.idle  { background: #333355; }
  .drc-win-log {
    flex: 1; overflow-y: auto;
    font-family: 'Menlo','Monaco',monospace;
    font-size: 11px; line-height: 1.8;
    color: #a0a0c0; white-space: pre;
    padding: 10px 14px;
    background: #0e0e1a;
  }
  /* Selection indicator */
  .sel { background: #c2d9ff; border-radius: 2px; }

  /* ── App window overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }

  .app-window {
    width: 860px;
    height: 620px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 0.5px rgba(0,0,0,0.22),
      0 4px 12px rgba(0,0,0,0.12),
      0 16px 48px rgba(0,0,0,0.22),
      0 40px 100px rgba(0,0,0,0.18);
    opacity: 0;
    transform: scale(0.94) translateY(24px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .app-window.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: all;
  }

  /* App title bar */
  .app-titlebar {
    height: 40px;
    background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%);
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    user-select: none;
  }

  .app-titlebar-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 500;
    color: #e0e0e0;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  /* App body: sidebar + main */
  .app-body {
    flex: 1;
    display: flex;
    background: #1e1e2e;
    overflow: hidden;
  }

  /* Sidebar */
  .app-sidebar {
    width: 200px;
    background: #17172a;
    border-right: 1px solid #2a2a3e;
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 6px 16px 2px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #555577;
    text-transform: uppercase;
  }

  .sidebar-item {
    padding: 7px 16px;
    font-size: 12.5px;
    color: #9090b0;
    cursor: default;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 0;
  }

  .sidebar-item.active {
    background: #2a2a45;
    color: #c8b8ff;
  }

  .sidebar-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #555577;
    flex-shrink: 0;
  }
  .sidebar-item.active .dot { background: #a07cff; }

  /* Main content */
  .app-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Toolbar */
  .app-toolbar {
    height: 40px;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a3e;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
  }

  .tool-btn {
    height: 26px;
    padding: 0 12px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 500;
    color: #9090b0;
    background: #24243a;
    border: 1px solid #33334a;
    cursor: default;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tool-btn.primary {
    background: #5a3fcf;
    border-color: #7055e0;
    color: #fff;
  }

  .tool-sep { flex: 1; }

  .tool-status {
    font-size: 11px;
    color: #50d890;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tool-status::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #50d890;
    display: inline-block;
  }

  /* Canvas area */
  .app-canvas {
    flex: 1;
    background: #13131f;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Chip grid graphic */
  .chip-graphic {
    position: relative;
    width: 320px;
    height: 260px;
  }

  .chip-body {
    position: absolute;
    inset: 40px;
    background: linear-gradient(135deg, #252538, #1a1a2e);
    border: 1.5px solid #5a3fcf;
    border-radius: 8px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 4px;
    padding: 12px;
  }

  .chip-cell {
    border-radius: 3px;
    background: #2a2a45;
  }

  .chip-cell.active { background: #5a3fcf; opacity: 0.85; }
  .chip-cell.hot    { background: #a07cff; opacity: 0.9; }
  .chip-cell.dim    { background: #1e1e30; }

  /* Pin rows */
  .chip-pins-top, .chip-pins-bottom {
    position: absolute;
    left: 60px; right: 60px;
    display: flex;
    justify-content: space-around;
  }
  .chip-pins-top    { top: 28px; }
  .chip-pins-bottom { bottom: 28px; }

  .chip-pins-left, .chip-pins-right {
    position: absolute;
    top: 60px; bottom: 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;

<script>
  const word   = 'NameOfAChipDesignProgram';
  const typed  = document.getElementById('typed');
  const cursor = document.getElementById('cursor');

  const TYPE_SPEED = 110;

  let index = 0;

  function setIdle(idle) {
    cursor.style.animationPlayState = idle ? 'running' : 'paused';
    cursor.style.opacity = '1';
  }

  function typeNext() {
    setIdle(false);
    if (index < word.length) {
      typed.textContent = word.slice(0, ++index);
      setTimeout(typeNext, TYPE_SPEED);
    } else {
      // Fully typed — cursor blinks idle, then open app after 3s
      setIdle(true);
      setTimeout(() => {
        document.getElementById('appWindow').classList.add('visible');
      }, 3000);
    }
  }

  setIdle(true);
  setTimeout(typeNext, 900);

  let currentFolder = '';

  function selectFolder(name) {
    document.querySelectorAll('.folder').forEach(f => f.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    currentFolder = name;
    document.getElementById('panelRight').innerHTML = '<div class="preview-empty">← Select a file type</div>';

    const panel = document.getElementById('panelLeft');
    const simOption = name === 'test_bench' ? `
      <div class="file-option" onclick="openSimWindow()" ondblclick="openSimWindow()">
        <div class="file-option-icon sim">▶</div>
        <div class="file-option-label">Simulación</div>
        <div class="file-option-ext">.sim</div>
      </div>` : '';
    const isTestBench = name === 'test_bench';
    panel.innerHTML = `
      <div class="panel-section-title">${name}</div>
      <div class="file-option" onclick="selectFile('sch')" ondblclick="openFileWindow('sch')">
        <div class="file-option-icon sch">⬡</div>
        <div class="file-option-label">Esquemático</div>
        <div class="file-option-ext">.sch</div>
      </div>
      ${isTestBench ? '' : `
      <div class="file-option" onclick="selectFile('lay')" ondblclick="openFileWindow('lay')">
        <div class="file-option-icon lay">⊞</div>
        <div class="file-option-label">Layout</div>
        <div class="file-option-ext">.gds</div>
      </div>
      <div class="file-option" onclick="selectFile('vhdl')" ondblclick="openFileWindow('vhdl')">
        <div class="file-option-icon vhdl">❮❯</div>
        <div class="file-option-label">VHDL</div>
        <div class="file-option-ext">.vhd</div>
      </div>
      <div class="file-option" onclick="selectFile('vlog')" ondblclick="openFileWindow('vlog')">
        <div class="file-option-icon vlog">❮❯</div>
        <div class="file-option-label">Verilog</div>
        <div class="file-option-ext">.v</div>
      </div>`}
      ${simOption}
    `;
    // Re-apply light theme if active
    if (lightTheme) panel.classList.add('light');
  }

  // ── Schematic SVG per folder ──────────────────────────────────────────────
  // Standard schematic colours (schemalib-ish)
  const W  = '#5a9cf5';   // wire blue
  const VD = '#50d890';   // VDD green
  const GD = '#e06060';   // GND red
  const CO = '#a07cff';   // component outline purple
  const TX = '#a0a0c0';   // text
  const DM = '#555577';   // dim text
  const BG = '#191926';   // component fill

  // Helper – power rail (VDD top, GND bottom) attached to a node
  function vdd(x,y){ return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y-18}" stroke="${VD}" stroke-width="1.4"/>
<polygon points="${x},${y-22} ${x-5},${y-14} ${x+5},${y-14}" fill="${VD}"/>
<text x="${x}" y="${y-25}" text-anchor="middle" fill="${VD}" font-size="8" font-family="monospace">VDD</text>`; }

  function gnd(x,y){ return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y+14}" stroke="${GD}" stroke-width="1.4"/>
<line x1="${x-10}" y1="${y+14}" x2="${x+10}" y2="${y+14}" stroke="${GD}" stroke-width="1.4"/>
<line x1="${x-6}"  y1="${y+18}" x2="${x+6}"  y2="${y+18}" stroke="${GD}" stroke-width="1.2"/>
<line x1="${x-2}"  y1="${y+22}" x2="${x+2}"  y2="${y+22}" stroke="${GD}" stroke-width="1"/>
<text x="${x}" y="${y+32}" text-anchor="middle" fill="${GD}" font-size="8" font-family="monospace">GND</text>`; }

  // Pin dot
  function pin(x,y,lbl,anchor){ return `<circle cx="${x}" cy="${y}" r="3" fill="${W}"/>
<text x="${anchor==='end'?x-6:x+6}" y="${y+4}" text-anchor="${anchor||'start'}" fill="${DM}" font-size="8" font-family="monospace">${lbl}</text>`; }

  // Wire
  function wire(...pts){ let d=`M${pts[0]},${pts[1]}`; for(let i=2;i<pts.length;i+=2) d+=` L${pts[i]},${pts[i+1]}`; return `<path d="${d}" stroke="${W}" stroke-width="1.4" fill="none"/>`; }

  // IC box with port labels
  function ic(x,y,w,h,lbl,lefts,rights){
    let s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${BG}" stroke="${CO}" stroke-width="1.5"/>`;
    s+=`<text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle" fill="${TX}" font-size="9" font-family="monospace" font-weight="bold">${lbl}</text>`;
    const step=h/(lefts.length+1);
    lefts.forEach((l,i)=>{const py=y+step*(i+1); s+=wire(x-18,py,x,py)+pin(x-18,py,l,'end');});
    const step2=h/(rights.length+1);
    rights.forEach((r,i)=>{const py=y+step2*(i+1); s+=wire(x+w,py,x+w+18,py)+pin(x+w+18,py,r,'start');});
    return s;
  }

  // MOSFET (NMOS) symbol at cx,cy facing right
  function nmos(cx,cy,lbl){
    const x=cx,y=cy;
    return `
<line x1="${x}" y1="${y-16}" x2="${x}" y2="${y+16}" stroke="${CO}" stroke-width="1.5"/>
<line x1="${x}" y1="${y-10}" x2="${x+8}" y2="${y-10}" stroke="${CO}" stroke-width="1.2"/>
<line x1="${x}" y1="${y}"    x2="${x+8}" y2="${y}"    stroke="${CO}" stroke-width="1.2"/>
<line x1="${x}" y1="${y+10}" x2="${x+8}" y2="${y+10}" stroke="${CO}" stroke-width="1.2"/>
<line x1="${x+8}" y1="${y-10}" x2="${x+8}" y2="${y+10}" stroke="${CO}" stroke-width="1.5"/>
<polygon points="${x+8},${y} ${x+16},${y-5} ${x+16},${y+5}" fill="${CO}"/>
<line x1="${x-14}" y1="${y}" x2="${x}" y2="${y}" stroke="${W}" stroke-width="1.4"/>
<text x="${x+9}" y="${y-18}" text-anchor="middle" fill="${DM}" font-size="8" font-family="monospace">${lbl}</text>`;
  }

  // Resistor
  function res(x1,y1,x2,y2,lbl){
    const mx=(x1+x2)/2,my=(y1+y2)/2,horiz=(y1===y2);
    let s=wire(x1,y1,horiz?mx-14:mx,horiz?my:my-14);
    s+=wire(horiz?mx+14:mx,horiz?my:my+14,x2,y2);
    if(horiz) s+=`<rect x="${mx-14}" y="${my-5}" width="28" height="10" rx="2" fill="${BG}" stroke="${CO}" stroke-width="1.2"/>`;
    else      s+=`<rect x="${mx-5}" y="${my-14}" width="10" height="28" rx="2" fill="${BG}" stroke="${CO}" stroke-width="1.2"/>`;
    s+=`<text x="${mx+(horiz?0:8)}" y="${my+(horiz?-8:4)}" text-anchor="${horiz?'middle':'start'}" fill="${DM}" font-size="8" font-family="monospace">${lbl}</text>`;
    return s;
  }

  // Capacitor vertical: top terminal at (x,y1), bottom at (x,y2), plates in middle
  function cap(x,y1,y2,lbl){
    const mid=(y1+y2)/2;
    const gap=5; // half-gap between plates
    return `
<line x1="${x}" y1="${y1}" x2="${x}" y2="${mid-gap}" stroke="${W}" stroke-width="1.4"/>
<line x1="${x-12}" y1="${mid-gap}" x2="${x+12}" y2="${mid-gap}" stroke="${CO}" stroke-width="2.2"/>
<line x1="${x-12}" y1="${mid+gap}" x2="${x+12}" y2="${mid+gap}" stroke="${CO}" stroke-width="2.2"/>
<line x1="${x}" y1="${mid+gap}" x2="${x}" y2="${y2}" stroke="${W}" stroke-width="1.4"/>
<text x="${x+16}" y="${mid+4}" fill="${DM}" font-size="8" font-family="monospace">${lbl}</text>`;
  }

  // Capacitor horizontal: left terminal at (x1,y), right at (x2,y), plates in middle
  function capH(x1,x2,y,lbl){
    const mid=(x1+x2)/2;
    const gap=5;
    return `
<line x1="${x1}" y1="${y}" x2="${mid-gap}" y2="${y}" stroke="${W}" stroke-width="1.4"/>
<line x1="${mid-gap}" y1="${y-12}" x2="${mid-gap}" y2="${y+12}" stroke="${CO}" stroke-width="2.2"/>
<line x1="${mid+gap}" y1="${y-12}" x2="${mid+gap}" y2="${y+12}" stroke="${CO}" stroke-width="2.2"/>
<line x1="${mid+gap}" y1="${y}" x2="${x2}" y2="${y}" stroke="${W}" stroke-width="1.4"/>
<text x="${mid}" y="${y-15}" text-anchor="middle" fill="${DM}" font-size="8" font-family="monospace">${lbl}</text>`;
  }

  // AND gate
  function andGate(x,y,w,h){
    const rx=x+w,ry=y+h/2;
    return `<path d="M${x},${y} L${x+w*0.55},${y} A${h/2},${h/2} 0 0 1 ${x+w*0.55},${y+h} L${x},${y+h} Z" fill="${BG}" stroke="${CO}" stroke-width="1.5"/>
<line x1="${x-16}" y1="${y+h*0.33}" x2="${x}" y2="${y+h*0.33}" stroke="${W}" stroke-width="1.4"/>
<line x1="${x-16}" y1="${y+h*0.67}" x2="${x}" y2="${y+h*0.67}" stroke="${W}" stroke-width="1.4"/>
<line x1="${x+w*0.55+h/2}" y1="${ry}" x2="${x+w*0.55+h/2+16}" y2="${ry}" stroke="${W}" stroke-width="1.4"/>
<circle cx="${x+w*0.55+h/2+16}" cy="${ry}" r="2.5" fill="${W}"/>`;
  }

  // OR gate  
  function orGate(x,y,w,h){
    const mx=x+w*0.55,my=y+h/2;
    return `<path d="M${x},${y} Q${x+w*0.4},${y} ${mx},${my} Q${x+w*0.4},${y+h} ${x},${y+h} Q${x+w*0.25},${y+h/2} ${x},${y} Z" fill="${BG}" stroke="${CO}" stroke-width="1.5"/>
<line x1="${x-16}" y1="${y+h*0.33}" x2="${x+8}" y2="${y+h*0.33}" stroke="${W}" stroke-width="1.4"/>
<line x1="${x-16}" y1="${y+h*0.67}" x2="${x+8}" y2="${y+h*0.67}" stroke="${W}" stroke-width="1.4"/>
<line x1="${mx+16}" y1="${my}" x2="${mx+32}" y2="${my}" stroke="${W}" stroke-width="1.4"/>
<circle cx="${mx+32}" cy="${my}" r="2.5" fill="${W}"/>`;
  }

  // MUX 2:1
  function mux(x,y){
    return `<polygon points="${x},${y} ${x+40},${y+10} ${x+40},${y+46} ${x},${y+56}" fill="${BG}" stroke="${CO}" stroke-width="1.5"/>
<text x="${x+20}" y="${y+32}" text-anchor="middle" fill="${TX}" font-size="8" font-family="monospace">MUX</text>
${wire(x-16,y+14,x,y+14)}${pin(x-16,y+14,'I0','end')}
${wire(x-16,y+42,x,y+42)}${pin(x-16,y+42,'I1','end')}
${wire(x+40,y+28,x+56,y+28)}${pin(x+56,y+28,'Y','start')}
${wire(x+20,y+56,x+20,y+70)}${pin(x+20,y+70,'SEL','start')}`;
  }

  // D flip-flop
  function dff(x,y){
    return `<rect x="${x}" y="${y}" width="50" height="60" rx="3" fill="${BG}" stroke="${CO}" stroke-width="1.5"/>
<text x="${x+25}" y="${y+20}" text-anchor="middle" fill="${TX}" font-size="8" font-family="monospace">DFF</text>
<text x="${x+4}"  y="${y+36}" fill="${DM}" font-size="7" font-family="monospace">D</text>
<text x="${x+4}"  y="${y+50}" fill="${DM}" font-size="7" font-family="monospace">CLK</text>
<text x="${x+38}" y="${y+36}" text-anchor="end" fill="${DM}" font-size="7" font-family="monospace">Q</text>
${wire(x-14,y+32,x,y+32)}${pin(x-14,y+32,'','end')}
${wire(x-14,y+46,x,y+46)}
<polygon points="${x},${y+44} ${x+7},${y+47} ${x},${y+50}" fill="${CO}"/>
${wire(x+50,y+32,x+64,y+32)}${pin(x+64,y+32,'','start')}`;
  }

  // PLL block
  function pll(x,y){
    return ic(x,y,80,80,'PLL',['REF','FB','EN'],['CLK_OUT','CLK_90','LOCK'])+
    vdd(x+40,y)+gnd(x+40,y+80);
  }

  // SRAM cell (6T)
  function sram6t(x,y){
    let s='';
    // 2 cross-coupled inverters + 2 access transistors
    s+=nmos(x+20,y+30,'M1')+nmos(x+60,y+30,'M2');
    s+=nmos(x+5,y+30,'MA1')+nmos(x+75,y+30,'MA2');
    s+=wire(x+20,y+20,x+60,y+20);
    s+=wire(x+20,y+40,x+60,y+40);
    s+=wire(x-10,y+30,x+5,y+30)+wire(x+91,y+30,x+106,y+30);
    s+=pin(x-10,y+30,'BL','end')+pin(x+106,y+30,'BLB','start');
    s+=wire(x+5,y+16,x+5,y+0)+wire(x+75,y+16,x+75,y+0);
    s+=wire(x+5,y+0,x+75,y+0);
    s+=pin(x+40,y+0,'WL','start');
    s+=vdd(x+40,y-10)+gnd(x+40,y+62);
    s+=`<text x="${x+40}" y="${y+85}" text-anchor="middle" fill="${DM}" font-size="8" font-family="monospace">6T SRAM Cell</text>`;
    return s;
  }

  // ── Per-folder schematic SVG ────────────────────────────────────────────────
  // COORDINATE CONVENTION FOR ic():
  //   left ports:  x_block - 18,  y = y_block + h/(n+1) * (i+1)
  //   right ports: x_block + w + 18, y = y_block + h/(n+1) * (i+1)
  // All wires must route in free space OUTSIDE all block rectangles.

  function buildSchematic(folder){
    const vb='0 0 320 220';
    const wrap = (inner) =>
      `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">${inner}</svg>`;

    switch(folder){

      // ── chip_top_v3 ────────────────────────────────────────────────────────
      // PLL  x=125,y=10  w=60,h=36   left:[XTAL]→y=28   right:[CLK]→y=28
      // CPU  x=10, y=70  w=65,h=80   left:[CLK,RST]  right:[DATA,IRQ]
      //                               L: step=80/3=26.6 → CLK@96, RST@123
      //                               R: step=80/3=26.6 → DATA@96, IRQ@123
      // MEM  x=140,y=65  w=65,h=80   left:[CS,WE]    right:[DATA,RDY]
      //                               L: step=80/3=26.6 → CS@91, WE@118
      //                               R: step=80/3=26.6 → DATA@91, RDY@118
      // IO   x=250,y=95  w=55,h=50   left:[BUS]→y=120  right:[GPIO]→y=120
      case 'chip_top_v3': {
        // ViewBox 0 0 320 220
        // ── Blocks ──────────────────────────────────────────────────────────
        // PLL  x=118, y=8,  w=58, h=36  → left ports y=8+36/2=26   right ports y=26
        //      L:[XTAL] step=36/2=18 → y=26    R:[CLK] → y=26
        // CPU  x=18,  y=68, w=62, h=78  → L:[CLK,RST] R:[DATA,IRQ]
        //      L: step=78/3=26 → CLK@94, RST@120   R: DATA@94, IRQ@120
        // MEM  x=138, y=63, w=62, h=78  → L:[CS,WE]   R:[DATA,RDY]
        //      L: step=78/3=26 → CS@89, WE@115       R: DATA@89, RDY@115
        // IO   x=252, y=93, w=52, h=50  → L:[BUS] R:[GPIO]
        //      L: step=50/2=25 → BUS@118              R: GPIO@118
        let s='';
        s=''; // clean start
        s+=ic(118,8,58,36,'PLL',['XTAL'],['CLK']);
        s+=ic(35,68,62,78,'CPU',['CLK','RST'],['DATA','IRQ']);
        s+=ic(148,63,62,78,'MEM',['CS','WE'],['DATA','RDY']);
        s+=ic(255,93,52,50,'IO',['BUS'],['GPIO']);

        // Port positions:
        // PLL  L:[XTAL] at (100,26)   R:[CLK] at (194,26)
        // CPU  L:[CLK]  at (17,94)    L:[RST] at (17,120)   R:[DATA] at (115,94)  R:[IRQ] at (115,120)
        // MEM  L:[CS]   at (130,89)   L:[WE]  at (130,115)  R:[DATA] at (228,89)  R:[RDY] at (228,115)
        // IO   L:[BUS]  at (237,118)  R:[GPIO]at (325,118) → clip
        // IO R port clips at x=325; let's shrink: IO x=252,w=50 → R:[GPIO] at (320,118) still clips
        // Use IO x=248,w=50: R exits at (316,118) still too far
        // Just label GPIO as stub at x=305

        // PLL.XTAL ←
        s+=wire(82,26,100,26); s+=pin(82,26,'XTAL','end');
        // VDD on PLL
        s+=vdd(147,8);

        // PLL.CLK (194,26) → route: right to x=210, down to y=55, left to x=52, down to CPU.CLK (17+18=35... 
        // CPU left ports at x=35-18=17. Too close. Route CLK from top of CPU instead:
        // Go left to x=55, down to y=68 (CPU top), enter via top — but ic() doesn't support top entry
        // Best: route (194,26)→down y=55→left to x=55→connect to cpu clk stub
        // CPU CLK stub: ic draws wire from (17,94)→(35,94). So (17,94) is the outer tip.
        // Route: (194,26)→(210,26)→(210,55)→(17,55)→(17,94)
        s+=wire(194,26,210,26,210,55,17,55,17,94);

        // CPU.DATA (115,94) → MEM.CS (130,89)
        s+=wire(115,94,130,94,130,89);

        // CPU.IRQ stub right
        s+=wire(115,120,132,120); s+=pin(132,120,'IRQ','start');

        // CPU.RST stub — left pin at (17,120), add label
        s+=pin(10,120,'RST','end');

        // MEM.DATA (228,89) → IO.BUS (237,118): right to x=244, down to y=118
        s+=wire(228,89,244,89,244,118,237,118);

        // MEM.RDY stub
        s+=wire(228,115,244,115); s+=pin(247,115,'RDY','start');

        // MEM.WE stub — left pin at (130,115), add label
        s+=pin(122,115,'WE','end');

        // IO.GPIO right — exits at (305+18=323) clips. Draw short stub with label
        s+=wire(305,118,314,118); s+=pin(314,118,'GPIO','start');

        // GND below MEM centre (MEM bottom = 63+78=141)
        s+=wire(179,141,179,188); s+=gnd(179,188);

        return wrap(s);
      }

      // ── mem_block_a ────────────────────────────────────────────────────────
      // AddrDec  x=10, y=75  w=60,h=70   left:[A[3:0]]  right:[CS0,CS1,CS2,CS3]
      //          L: step=70/2=35 → A[3:0]@110
      //          R: step=70/5=14 → CS0@89, CS1@103, CS2@117, CS3@131
      // SRAM     x=130,y=60  w=65,h=80   left:[CS,WE,A]  right:[DQ]
      //          L: step=80/4=20 → CS@80, WE@100, A@120
      //          R: step=80/2=40 → DQ@100
      // SenseAmp x=250,y=85  w=55,h=50   left:[IN+,IN-]  right:[OUT]
      //          L: step=50/3=16.6 → IN+@102, IN-@118
      //          R: step=50/2=25   → OUT@110
      case 'mem_block_a': {
        // AddrDec x=28,y=70,w=55,h=80  L:[A[3:0]] step=80/2=40→A@110  R:[CS0,CS1,CS2,CS3] step=80/5=16→@86,@102,@118,@134  R exits at x=101

  function handleSchZoom(e, container) {
    e.preventDefault();
    const inner = container.querySelector('.sch-inner');
    if (!inner) return;
    let scale = parseFloat(inner.dataset.scale || '1');
    scale = Math.min(4, Math.max(0.3, scale * (e.deltaY < 0 ? 1.1 : 0.91)));
    inner.dataset.scale = scale;
    const ox = parseFloat(inner.dataset.ox || '0');
    const oy = parseFloat(inner.dataset.oy || '0');
    inner.style.transform = `translate(${ox}px,${oy}px) scale(${scale})`;
  }

  function handleSchPanStart(e, container) {
    if (e.button !== 0) return;
    if (placingElem || wireMode) return;  // let handleCanvasClick handle these
    const inner = container.querySelector('.sch-inner');
    if (!inner) return;
    container.style.cursor = 'grabbing';
    const startX = e.clientX, startY = e.clientY;
    const ox = parseFloat(inner.dataset.ox || '0');
    const oy = parseFloat(inner.dataset.oy || '0');
    function move(ev) {
      const dx = ev.clientX - startX + ox;
      const dy = ev.clientY - startY + oy;
      inner.dataset.ox = dx; inner.dataset.oy = dy;
      const sc = parseFloat(inner.dataset.scale || '1');
      inner.style.transform = `translate(${dx}px,${dy}px) scale(${sc})`;
    }
    function up() {
      container.style.cursor = 'grab';
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    e.preventDefault();
  }

  function runDRC(folder, panel) {
    const rules = DRC_RULES[folder] || [

      { t:'ok',  m:'Via enclosure check ....................... PASS' },
      { t:'ok',  m:'ERC: no floating nets ..................... PASS' },
    ];

    const errors = rules.filter(r => r.t === 'err').length;
    const warns  = rules.filter(r => r.t === 'warn').length;
    const passes = rules.filter(r => r.t === 'ok').length;

    panel.innerHTML = `<div class="preview-wrap">

  function showResultTab(tab, view) {
    tab.closest('.results-win').querySelectorAll('.results-tab').forEach(t => t.classList.remove('active'));

    const ctx = canvas.getContext('2d');
    if (view === 'waveform') { drawWaveform('tran', canvas); }
    else if (view === 'measures') { drawMeasures(canvas); }
    else if (view === 'log') { drawLog(canvas); }
  }

  function drawWaveform(simType, canvasEl) {
    const canvas = canvasEl || document.getElementById('waveCanvas');
    if (!canvas) return;
    const win = canvas.closest('.results-win');
    canvas.width  = win.offsetWidth;
    canvas.height = win.offsetHeight - 38 - 34;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pad = { t:20, b:40, l:52, r:20 };
    const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;

    ctx.fillStyle = '#0e0e1a'; ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle = '#1e1e30'; ctx.lineWidth = 1;
    for (let i=0;i<=10;i++) {
      const y = pad.t + ph/10*i;
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    }
    for (let i=0;i<=8;i++) {
      const x = pad.l + pw/8*i;
      ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,pad.t+ph); ctx.stroke();
    }

    // Axes labels
    ctx.fillStyle = '#555577'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    for (let i=0;i<=4;i++) {
      const v = (1.8 - i*0.45).toFixed(2);
      const y = pad.t + ph/4*i;
      ctx.fillText(v+'V', pad.l-4, y+4);
    }
    ctx.textAlign = 'center';
    const steps = simType==='ac' ? ['1k','10k','100k','1M','10M','100M','1G'] : ['0','10n','20n','30n','40n','50n','60n','70n','80n','90n','100n'];
    const xsteps = Math.min(steps.length, 9);
    for (let i=0;i<xsteps;i++) {
      const x = pad.l + pw/(xsteps-1)*i;
      ctx.fillText(steps[i] || '', x, H-pad.b+14);
    }

    // Waveforms
    const signals = simType === 'ac'
      ? [
          { color:'#5a9cf5', label:'V(out) dB', fn: x => { const f=Math.pow(10,3+x*6); return 0.3+20*(1/(1+Math.pow(f/1e6,2))); } },
          { color:'#50d890', label:'Phase °',   fn: x => 0.5 - Math.atan(Math.pow(10,3+x*6)/1e6)/Math.PI*0.4 },
        ]
      : simType === 'dc'
      ? [
          { color:'#5a9cf5', label:'V(out)',  fn: x => { const v=x*1.8; return v < 0.45 ? 0.05 : v > 1.35 ? 0.95 : (v-0.45)/0.9; } },
          { color:'#50d890', label:'I(Iss)',  fn: x => 0.3 + 0.15*Math.sin(x*Math.PI) },
        ]
      : [
          { color:'#5a9cf5', label:'V(out)',  fn: x => 0.5+0.45*Math.sin(x*4*Math.PI+0.3)*Math.exp(-x*0.5) },
          { color:'#50d890', label:'V(in)',   fn: x => 0.5+0.44*Math.sin(x*4*Math.PI) },
          { color:'#a07cff', label:'V(tail)', fn: x => 0.2+0.08*Math.sin(x*8*Math.PI) },
        ];

    signals.forEach(sig => {
      ctx.strokeStyle = sig.color; ctx.lineWidth = 1.8; ctx.beginPath();
      for (let px=0;px<=pw;px++) {
        const x = px/pw;
        const y = pad.t + ph*(1 - sig.fn(x));
        px===0 ? ctx.moveTo(pad.l+px,y) : ctx.lineTo(pad.l+px,y);
      }
      ctx.stroke();
    });

    // Legend
    signals.forEach((sig,i) => {
      const lx = pad.l + 10 + i*110, ly = pad.t + 12;
      ctx.fillStyle = sig.color;
      ctx.fillRect(lx, ly-7, 20, 3);
      ctx.font = '10px monospace'; ctx.textAlign = 'left';
      ctx.fillText(sig.label, lx+24, ly-3);
    });

    // Axis label
    ctx.fillStyle = '#444466'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(simType==='ac' ? 'Frecuencia' : simType==='dc' ? 'V(in)' : 'Tiempo', pad.l+pw/2, H-4);
  }

  function drawMeasures(canvas) {
    const W=canvas.width, H=canvas.height;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#0e0e1a'; ctx.fillRect(0,0,W,H);
    const measures = [
      ['Señal','Medida','Valor','Unidad'],
      ['V(out)','V_max','1.764','V'],
      ['V(out)','V_min','0.036','V'],
      ['V(out)','Rise time (10-90%)','2.3','ns'],
      ['V(out)','Fall time','1.9','ns'],
      ['V(out)','Propagation delay','5.1','ns'],
      ['V(in)', 'Frecuencia','100','MHz'],
      ['V(in)', 'Amplitud','1.8','V'],
      ['I(Iss)','DC bias','50.2','μA'],
      ['V(tail)','DC level','0.212','V'],
      ['─────','─────────────','─────','─────'],
      ['GBW','─','420','MHz'],
      ['Phase margin','─','62','°'],
      ['CMRR','─','68','dB'],
    ];
    ctx.font = '11px monospace'; const rh=22, x0=20, y0=24;
    measures.forEach((row,ri) => {
      const cols=[180,120,80,60];
      let cx=x0;
      row.forEach((cell,ci) => {
        ctx.fillStyle = ri===0 ? '#a07cff' : ci===2 ? '#50d890' : '#888';
        if (ri>0 && ri%2===0) { ctx.fillStyle='#13132a'; ctx.fillRect(x0-4,y0+ri*rh-14,W-x0+4,rh); ctx.fillStyle = ci===2 ? '#50d890' : '#888'; }
        ctx.fillText(cell, cx, y0+ri*rh);
        cx+=cols[ci]||80;
      });
    });
  }

  function getBreadcrumb(name) {
    const parent = Object.entries(HIERARCHY).find(([k,v]) => v.includes(name));
    if (!parent) return `<span class="sch-bc-cur">${name}</span>`;
    return `<span class="sch-bc-item" onclick="drillUp(this,'${parent[0]}')">${parent[0]}</span>
